name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - dev

  push:
    branches:
      - main

jobs:

  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint || true

      - name: Run audit
        run: npm audit --audit-level=high || true

      - name: Run tests
        run: npm test || true

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint || true

      - name: Run audit
        run: npm audit --audit-level=high || true

  docker-build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    needs:
      - test-backend
      - test-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t zeriix3/devops_tp4_backend:latest ./backend

      - name: Push backend image
        run: |
          docker push zeriix3/devops_tp4_backend:latest

      - name: Build frontend image
        run: |
          docker build -t zeriix3/devops_tp4_frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push zeriix3/devops_tp4_frontend:latest
